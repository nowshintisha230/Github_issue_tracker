 <title>GitHub_issue_tracker</title>

    <!--tailwind-->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <!--daisyui-->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<!--google fonts-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
      <style>
        .activeBtn {
  background-color: #2563eb; /* blue */
  color: white;
 font-family: "Hind Siliguri", sans-serif;
  
}
      </style>
    <!--body-->
    <body class="space-y-5 w11/12 mx-auto p-5">
      <!--navbar-->
<header>
      <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">
    <h1 class="btn btn-ghost  md:text-xl font-bold"> <i class="fa-brands fa-github fa-x"></i>Git Issues Tracker</h1>
  </div>
  <div class="flex gap-2">

    
  <!-- Input -->
  <input type="text" id="searchInput" placeholder="Search Issues......."  class="input input-bordered w-24 md:w-auto" />


    <button class="btn btn-primary"> + New Issues</button>
    </div>
    </div>
</header>
<!--hero-->
<section>
   <div>
      <button  id="allBtn" class="btn ">All</button>
  <button id="openBtn" class="btn">Open</button>
  <button id="closedBtn" class="btn ">Closed</button>
   </div>
</section>
<section class="Menu w-full ">
   <div class="navbar bg-base-300 space-x-1 rounded-xl flex justify-between">
      <div class="flex gap-5">
     <img src="./assets/Aperture.png" alt="" class="bg-purple-300 rounded-full p-[0.44rem] w-10 h-10 m-auto">
      <div>
   <h1 class="font-bold text-2xl">50 issues</h1>
   <p clss="text-gray-500">Track and manage your project issues</p>
</div>
</div>
  <div class="flex gap-5 ml-3">
  <p><i class="fa-solid fa-circle" style="color:rgb(75, 215, 75)"></i>Open</p>
  <p><i class="fa-solid fa-circle" style="color:rgb(96, 78, 233)"></i>Close</p>
</div>
</div>
</div>
</section>
<!--display issues-->
<div id="issues-container"  class=" grid grid-cols-1 gap-3 lg:grid-cols-4"></div>
<!--spinner-->
<section id="spinner" class="flex items-center justify-center hidden">
<span class="loading loading-spinner text-error py-20"></span>
</section>

<!--modal-->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="modal-container">
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>


<!--js scripts-->
<script src="./script.js/home.js"></script>
    </body>
